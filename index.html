<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OWL Macrocycle Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>Olympic Weightlifting</h1>
  <p>12-Week Macrocycle Comparison &nbsp;·&nbsp; 6 Methodologies &nbsp;·&nbsp; Side by Side</p>
</header>

<!-- METHOD SELECTOR -->
<div class="selector-bar">
  <div class="sel-group">
    <label id="lblA">Method A</label>
    <select id="selA"><option value="chinese" selected>Chinese</option><option value="bulgarian">Bulgarian</option><option value="soviet">Soviet / Russian</option><option value="catalyst">Catalyst Athletics (Everett)</option><option value="pendlay">Pendlay</option><option value="klokov">Klokov / Modern Russian</option></select>
  </div>
  <div class="vs-badge">VS</div>
  <div class="sel-group">
    <label id="lblB">Method B</label>
    <select id="selB"><option value="chinese">Chinese</option><option value="bulgarian" selected>Bulgarian</option><option value="soviet">Soviet / Russian</option><option value="catalyst">Catalyst Athletics (Everett)</option><option value="pendlay">Pendlay</option><option value="klokov">Klokov / Modern Russian</option></select>
  </div>
</div>

<!-- 12-WEEK MACROCYCLE -->
<div class="sec-title">12-Week Macrocycle</div>
<div class="macro-wrap">
  <div class="macro-grid" id="macroGrid"></div>
</div>

<!-- METHODOLOGY OVERVIEW -->
<div class="sec-title">Methodology Overview</div>
<div class="summ-wrap" id="summWrap"></div>

<!-- EXAMPLE TRAINING WEEK -->
<div class="sec-title">Example Training Week</div>
<div class="week-wrap">
  <div class="week-controls">
    <div class="wk-group">
      <label>Mesocycle</label>
      <select id="selMeso"><option value="accumulation">Accumulation (Weeks 1–3)</option><option value="intensification">Intensification (Weeks 5–7)</option><option value="peaking">Peaking (Weeks 9–11)</option></select>
    </div>
    <div id="weekLabel"></div>
  </div>
  <div class="week-grid" id="weekGrid"></div>
</div>

<!-- EXERCISE LIBRARY -->
<div class="sec-title">Exercise Library</div>
<div class="ex-wrap">
  <div class="ex-scroll">
    <table class="ex-table" id="exTable"></table>
  </div>
</div>

<!-- DATA: load before the ES module -->
<script src="data/methods.js"></script>
<script src="data/exercises.js"></script>
<script src="data/weeks.js"></script>
<script type="module" src="js/main.js"></script>

</body>
</html>
