<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OWL Macrocycle Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #15171a;
    --border: #252830;
    --text: #e8eaf0;
    --muted: #5c6070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  header { text-align: center; margin-bottom: 36px; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 5vw, 64px);
    letter-spacing: 0.06em;
    line-height: 1;
  }
  header p {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
  }

  /* ── SELECTOR ── */
  .selector-bar {
    max-width: 860px;
    margin: 0 auto 52px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 28px;
  }
  .selector-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 220px; }
  .selector-group label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .selector-group select {
    background: #1c1f26;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 14px;
    appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }
  #selA { border-color: rgba(var(--ca-rgb),0.45); }
  #selB { border-color: rgba(var(--cb-rgb),0.45); }
  .vs-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--border);
    padding-bottom: 4px;
    flex-shrink: 0;
  }

  /* ── SECTION TITLE ── */
  .sec-title {
    max-width: 1100px;
    margin: 0 auto 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 3vw, 34px);
    letter-spacing: 0.12em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  /* ── MACROCYCLE GRID ── */
  .macro-wrap { max-width: 1100px; margin: 0 auto 64px; }
  .macro-grid {
    display: grid;
    grid-template-columns: 68px 1fr 1fr;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .mg-head {
    padding: 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 3px;
  }
  .mg-head.axis { background: var(--surface); }
  .mg-head.cola { border-left: 1px solid var(--border); background: rgba(var(--ca-rgb),0.10); }
  .mg-head.colb { border-left: 1px solid var(--border); background: rgba(var(--cb-rgb),0.10); }
  .mg-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 19px;
    letter-spacing: 0.08em;
  }
  .mg-name.cola { color: var(--ca); }
  .mg-name.colb { color: var(--cb); }
  .mg-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  .mg-meso {
    grid-column: 1 / -1;
    background: #1a1c20;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 7px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  .mg-axis {
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 10px 4px; gap: 1px;
  }
  .mg-wn { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--muted); line-height: 1; }
  .mg-wt { font-family: 'DM Mono', monospace; font-size: 7px; color: #353840; text-transform: uppercase; }
  .mg-axis.deload .mg-wn { color: #30343c; }

  .mg-cell {
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    padding: 11px 13px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .mg-cell.cola { background: rgba(var(--ca-rgb),0.07); }
  .mg-cell.colb { background: rgba(var(--cb-rgb),0.07); }
  .mg-cell.deload { opacity: 0.55; }

  .mg-hl { font-weight: 600; font-size: 11.5px; color: var(--text); }
  .mg-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    display: inline-flex; padding: 2px 6px;
    border-radius: 3px; font-family: 'DM Mono', monospace;
    font-size: 8.5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
  }
  .tv-h  { background: rgba(58,159,224,0.22); color: #72b8e8; }
  .tv-m  { background: rgba(100,100,130,0.22); color: #8888aa; }
  .tv-l  { background: rgba(50,50,70,0.3); color: #606080; }
  .ti-pk { background: rgba(224,92,58,0.38); color: #ff8060; border:1px solid rgba(224,92,58,0.38); }
  .ti-h  { background: rgba(224,92,58,0.2); color: #e88a72; }
  .ti-m  { background: rgba(224,180,58,0.2); color: #d4b060; }
  .ti-l  { background: rgba(126,200,122,0.2); color: #7ec87a; }
  .tf    { background: rgba(200,200,255,0.07); color: #9090b0; }

  .mg-desc { font-size: 10.5px; color: #707888; line-height: 1.55; }
  .mg-focus {
    font-family: 'DM Mono', monospace; font-size: 9px; color: #454a58;
    padding-top: 4px; border-top: 1px dashed #252830;
  }

  /* ── SUMMARY CARDS ── */
  .summ-wrap {
    max-width: 1100px; margin: 0 auto 64px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .summ-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .summ-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 0.08em; margin-bottom: 12px; }
  .summ-card h3.cola { color: var(--ca); }
  .summ-card h3.colb { color: var(--cb); }
  .attr-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .attr-list li { display: flex; gap: 9px; font-size: 11.5px; color: #7a8090; line-height: 1.4; }
  .attr-list li::before { content: '→'; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .attr-list li span { color: var(--text); font-weight: 600; }

  /* ── EXERCISE TABLE ── */
  .ex-wrap { max-width: 1100px; margin: 0 auto 80px; }
  .ex-scroll { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  .ex-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
  .ex-table thead tr { background: #1a1c22; }
  .ex-table th {
    padding: 13px 14px; text-align: left;
    font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.1em;
    border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  .th-cat { color: var(--muted); width: 20%; }
  .th-a   { color: var(--ca); width: 40%; border-left: 1px solid var(--border); }
  .th-b   { color: var(--cb); width: 40%; border-left: 1px solid var(--border); }

  .ex-table tbody tr:nth-child(even):not(.sec-row) { background: rgba(255,255,255,0.016); }
  .ex-table tbody tr:hover:not(.sec-row) { background: rgba(255,255,255,0.032); }

  .sec-row td {
    background: #1a1d24; color: var(--muted);
    font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 0.18em;
    text-transform: uppercase; padding: 9px 14px;
    border-top: 2px solid var(--border); border-bottom: 1px solid var(--border);
  }
  td.td-n { padding: 10px 14px; font-weight: 600; font-size: 11.5px; color: var(--text); vertical-align: top; border-bottom: 1px solid #1c1e24; line-height: 1.4; }
  td.td-a, td.td-b {
    padding: 10px 14px; vertical-align: top;
    border-bottom: 1px solid #1c1e24; border-left: 1px solid var(--border);
    line-height: 1.6; color: #8a92a8; font-size: 11px;
  }
  td.td-a { background: rgba(var(--ca-rgb),0.035); }
  td.td-b { background: rgba(var(--cb-rgb),0.035); }
  td.absent { color: #35404e !important; font-style: italic; font-size: 10.5px; }

  @media (max-width: 680px) {
    .macro-grid { grid-template-columns: 44px 1fr 1fr; }
    .mg-name { font-size: 13px; }
    .summ-wrap { grid-template-columns: 1fr; }
    .selector-bar { flex-direction: column; }
    .vs-badge { padding-bottom: 0; }
  }
</style>
</head>

// ── MESO LABELS ──────────────────────────────────────────────────────────────
const MESO_LABELS = [
  'Mesocycle 1 · Weeks 1–4 · Accumulation',
  'Mesocycle 2 · Weeks 5–8 · Intensification',
  'Mesocycle 3 · Weeks 9–12 · Peaking & Competition Prep',
];
const MESO_STARTS = [0, 4, 8];

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const keyA = document.getElementById('selA').value;
  const keyB = document.getElementById('selB').value;
  const mA   = METHODS[keyA];
  const mB   = METHODS[keyB];
  const cA   = COLORS[keyA];
  const cB   = COLORS[keyB];

  // update CSS vars
  document.documentElement.style.setProperty('--ca', cA.hex);
  document.documentElement.style.setProperty('--ca-rgb', cA.rgb);
  document.documentElement.style.setProperty('--cb', cB.hex);
  document.documentElement.style.setProperty('--cb-rgb', cB.rgb);

  // labels
  document.querySelector('#selA').previousElementSibling.style.color = cA.hex;
  document.querySelector('#selB').previousElementSibling.style.color = cB.hex;

  renderMacro(mA, mB);
  renderSummary(mA, mB, cA, cB);
  renderExercises(mA, mB, cA, cB);
}

function renderMacro(mA, mB) {
  const g = document.getElementById('macroGrid');
  let html = '';

  // header row
  html += `<div class="mg-head axis"></div>`;
  html += `<div class="mg-head cola"><div class="mg-name cola">${mA.name}</div><div class="mg-sub">${mA.sub}</div></div>`;
  html += `<div class="mg-head colb"><div class="mg-name colb">${mB.name}</div><div class="mg-sub">${mB.sub}</div></div>`;

  for (let i = 0; i < 12; i++) {
    // meso banner
    if (MESO_STARTS.includes(i)) {
      html += `<div class="mg-meso">${MESO_LABELS[MESO_STARTS.indexOf(i)]}</div>`;
    }

    const wA = mA.weeks[i];
    const wB = mB.weeks[i];
    const dlA = wA.deload ? ' deload' : '';
    const dlB = wB.deload ? ' deload' : '';
    const axDl = (wA.deload && wB.deload) ? ' deload' : '';

    html += `<div class="mg-axis${axDl}"><div class="mg-wn">W${i+1}</div><div class="mg-wt">${wA.deload ? 'Deload' : (i<4?'Accum':i<8?'Intens':'Peak')}</div></div>`;
    html += `<div class="mg-cell cola${dlA}"><div class="mg-hl">${wA.hl}</div><div class="mg-tags">${wA.tags.map((t,j)=>`<span class="tag ${t}">${j===0?wA.tv:j===1?wA.ti:wA.fr}</span>`).join('')}</div><div class="mg-desc">${wA.desc}</div><div class="mg-focus">${wA.focus}</div></div>`;
    html += `<div class="mg-cell colb${dlB}"><div class="mg-hl">${wB.hl}</div><div class="mg-tags">${wB.tags.map((t,j)=>`<span class="tag ${t}">${j===0?wB.tv:j===1?wB.ti:wB.fr}</span>`).join('')}</div><div class="mg-desc">${wB.desc}</div><div class="mg-focus">${wB.focus}</div></div>`;
  }

  g.innerHTML = html;
}

function renderSummary(mA, mB, cA, cB) {
  const w = document.getElementById('summWrap');
  const card = (m, cls) => `
    <div class="summ-card">
      <h3 class="${cls}">${m.name}</h3>
      <ul class="attr-list">
        ${m.summary.map(([k,v])=>`<li><span>${k}:</span> ${v}</li>`).join('')}
      </ul>
    </div>`;
  w.innerHTML = card(mA,'cola') + card(mB,'colb');
}

function renderExercises(mA, mB, cA, cB) {
  const t = document.getElementById('exTable');

  // gather all categories
  const cats = new Set([...Object.keys(mA.exercises), ...Object.keys(mB.exercises)]);
  let html = `<thead><tr>
    <th class="th-cat">Exercise</th>
    <th class="th-a">${mA.name}</th>
    <th class="th-b">${mB.name}</th>
  </tr></thead><tbody>`;

  for (const cat of cats) {
    html += `<tr class="sec-row"><td colspan="3">${cat}</td></tr>`;
    const exA = mA.exercises[cat] || {};
    const exB = mB.exercises[cat] || {};
    const exKeys = new Set([...Object.keys(exA), ...Object.keys(exB)]);
    for (const ex of exKeys) {
      const vA = exA[ex];
      const vB = exB[ex];
      const cA_absent = !vA || vA.startsWith('—') ? ' absent' : '';
      const cB_absent = !vB || vB.startsWith('—') ? ' absent' : '';
      html += `<tr>
        <td class="td-n">${ex}</td>
        <td class="td-a${cA_absent}">${vA || '— Not present'}</td>
        <td class="td-b${cB_absent}">${vB || '— Not present'}</td>
      </tr>`;
    }
  }

  html += '</tbody>';
  t.innerHTML = html;
}

// init
render();
